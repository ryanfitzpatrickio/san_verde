<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outrun</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #error {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    #error h2 {
      margin-bottom: 0.5rem;
    }
  </style>
</head>

<body>
  <div id="error">
    <h2>WebGPU Not Supported</h2>
    <p>Please use a browser with WebGPU support (Chrome 113+, Edge 113+, Firefox Nightly)</p>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.183.2",
        "three/webgpu": "https://esm.sh/three@0.183.2/webgpu",
        "three/tsl": "https://esm.sh/three@0.183.2/tsl",
        "three/addons/": "https://esm.sh/three@0.183.2/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
