<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Logo - WGSL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #error {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    #error h2 {
      margin-bottom: 0.5rem;
    }

    #switcher {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    #switcher a {
      padding: 8px 16px;
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      text-decoration: none;
      border-radius: 20px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      transition: all 0.3s;
    }

    #switcher a:hover {
      background: rgba(0, 212, 255, 0.3);
    }

    #switcher a.active {
      background: rgba(0, 212, 255, 0.4);
      border-color: #00d4ff;
    }
  </style>
</head>

<body>
  <div id="error">
    <h2>WebGPU Not Supported</h2>
    <p>Please use a browser with WebGPU support (Chrome 113+, Edge 113+, Firefox Nightly)</p>
  </div>
  <div id="switcher">
    <a href="index.html">TSL</a>
    <a href="wgsl.html" class="active">WGSL</a>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.183.2",
        "three/webgpu": "https://esm.sh/three@0.183.2/webgpu",
        "three/tsl": "https://esm.sh/three@0.183.2/tsl",
        "three/addons/": "https://esm.sh/three@0.183.2/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main-wgsl.js"></script>
</body>

</html>
