<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 360px;
      background: #222;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid #333;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #8fa;
    }

    h3 {
      font-size: 12px;
      margin-bottom: 6px;
      color: #aaa;
    }

    .section {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }

    #controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 12px;
      background: #3a7d3a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #4a8d4a;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    button.secondary {
      background: #444;
    }

    button.secondary:hover {
      background: #555;
    }

    button.danger {
      background: #a54a4a;
    }

    button.danger:hover {
      background: #b55a5a;
    }

    #building-info {
      background: #333;
      padding: 12px;
      border-radius: 4px;
    }

    #building-info p {
      font-size: 11px;
      color: #aaa;
      margin: 4px 0;
    }

    #catalog-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #catalog-list button {
      text-align: left;
      background: #333;
      font-size: 11px;
      padding: 4px 8px;
    }

    #catalog-list button:hover {
      background: #444;
    }

    #catalog-list button.active {
      background: #3a7d3a;
    }

    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #viewer-header {
      padding: 8px 16px;
      background: #222;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #viewer-header button {
      padding: 4px 10px;
      font-size: 11px;
    }

    canvas {
      flex: 1;
      background: linear-gradient(180deg, #87ceeb 0%, #b0d4e8 50%, #d4e4d1 100%);
    }

    #status {
      padding: 8px 16px;
      background: #222;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #8fa;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ddd;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 10px;
      padding: 8px;
      resize: vertical;
    }

    select,
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ddd;
      font-size: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row>* {
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      padding: 6px;
      background: #333;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 11px;
    }

    .tab.active {
      background: #3a7d3a;
      color: #fff;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    #lod-output {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
      white-space: pre-wrap;
      color: #8f8;
    }

    .error {
      color: #f88;
    }

    .success {
      color: #8f8;
    }

    .warning {
      color: #fa8;
    }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    #prompt-preview {
      max-height: 150px;
      overflow-y: auto;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      font-size: 10px;
      color: #aaa;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <div class="section">
      <h2>Building Catalog</h2>
      <div id="controls">
        <button id="prevBtn">Prev</button>
        <button id="nextBtn">Next</button>
      </div>
      <div id="building-info">
        <p><strong id="building-name">Loading...</strong></p>
        <p id="building-pack">Pack: -</p>
        <p id="building-districts">Districts: -</p>
        <p id="building-count">Building 0 / 0</p>
      </div>
      <div id="catalog-list"></div>
    </div>

    <div class="section">
      <h2>LOD Generation</h2>
      <input type="hidden" id="model-select" value="google/gemini-2.5-flash">

      <label style="margin-top:8px">Enhancement Level</label>
      <select id="lod-level">
        <option value="moderate">Moderate (2-3x detail)</option>
        <option value="high">High (3-5x detail)</option>
        <option value="extreme">Extreme (5-10x detail)</option>
      </select>

      <div style="margin-top:8px">
        <button id="generateLodBtn" style="width:100%">Generate Enhanced LOD</button>
      </div>
      <div class="row" style="margin-top:6px">
        <button id="previewPromptBtn" class="secondary">Preview Prompt</button>
        <button id="applyLodBtn" class="secondary" disabled>Apply Result</button>
      </div>
    </div>

    <div class="section">
      <h2>JSON Editor</h2>
      <div class="tabs">
        <button class="tab active" data-tab="current">Current</button>
        <button class="tab" data-tab="generated">Generated</button>
      </div>
      <div id="current-panel" class="panel active">
        <textarea id="current-json"></textarea>
        <div class="row" style="margin-top:6px">
          <button id="saveCurrentBtn" class="secondary">Save Changes</button>
          <button id="resetCurrentBtn" class="secondary">Reset</button>
        </div>
      </div>
      <div id="generated-panel" class="panel">
        <textarea id="generated-json" placeholder="Generated LOD will appear here..."></textarea>
        <div class="row" style="margin-top:6px">
          <button id="useGeneratedBtn" class="secondary">Use This</button>
          <button id="diffBtn" class="secondary">Show Diff</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Batch Operations</h2>
      <div class="row">
        <button id="generateAllBtn" class="secondary">Generate All in Pack</button>
        <button id="exportPackBtn" class="secondary">Export Pack</button>
      </div>
    </div>
  </div>

  <div id="viewer">
    <div id="viewer-header">
      <button id="savePngBtn">Save PNG</button>
      <button id="toggleWireBtn" class="secondary">Wireframe</button>
      <button id="toggleRotateBtn" class="secondary">Auto-Rotate</button>
      <span style="color:#888;font-size:11px" id="viewer-status">Ready</span>
    </div>
    <canvas id="canvas"></canvas>
    <div id="status">Ready</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const OPENROUTER_API_KEY = import.meta.env.VITE_OPENROUTER_API_KEY;
    const CATALOG_MODULES = import.meta.glob('./src/game/bloomville/catalogs/*.json', { eager: true, import: 'default' });

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGPURenderer({ canvas, preserveDrawingBuffer: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87ceeb');

    const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 1000);
    camera.position.set(40, 40, 40);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(20, 40, 20);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 100;
    directionalLight.shadow.camera.left = -30;
    directionalLight.shadow.camera.right = 30;
    directionalLight.shadow.camera.top = 30;
    directionalLight.shadow.camera.bottom = -30;
    scene.add(directionalLight);

    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: '#7a9970', roughness: 0.95 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const BOX_GEOMETRY_CACHE = new Map();
    const GABLE_ROOF_GEOMETRY_CACHE = new Map();
    let wireframeMode = false;
    let autoRotate = false;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height - 80;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    function getBoxGeometry(size) {
      const w = Math.max(0.01, Number(size?.[0]) || 1);
      const h = Math.max(0.01, Number(size?.[1]) || 1);
      const d = Math.max(0.01, Number(size?.[2]) || 1);
      const key = `${w}:${h}:${d}`;
      if (!BOX_GEOMETRY_CACHE.has(key)) {
        BOX_GEOMETRY_CACHE.set(key, new THREE.BoxGeometry(w, h, d));
      }
      return BOX_GEOMETRY_CACHE.get(key);
    }

    function getGableRoofGeometry(width, depth, height) {
      const key = `${width}:${depth}:${height}`;
      if (!GABLE_ROOF_GEOMETRY_CACHE.has(key)) {
        const halfWidth = width * 0.5;
        const halfDepth = depth * 0.5;
        const geometry = new THREE.BufferGeometry();
        const vertices = new Float32Array([
          -halfWidth, 0, -halfDepth, halfWidth, 0, -halfDepth, 0, height, -halfDepth,
          -halfWidth, 0, halfDepth, 0, height, halfDepth, halfWidth, 0, halfDepth,
          -halfWidth, 0, -halfDepth, 0, height, -halfDepth, 0, height, halfDepth, -halfWidth, 0, halfDepth,
          halfWidth, 0, -halfDepth, halfWidth, 0, halfDepth, 0, height, halfDepth, 0, height, -halfDepth,
          -halfWidth, 0, -halfDepth, -halfWidth, 0, halfDepth, halfWidth, 0, halfDepth, halfWidth, 0, -halfDepth
        ]);
        const indices = [0, 1, 2, 3, 4, 5, 6, 7, 8, 6, 8, 9, 10, 11, 12, 10, 12, 13, 14, 15, 16, 14, 16, 17];
        geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        GABLE_ROOF_GEOMETRY_CACHE.set(key, geometry);
      }
      return GABLE_ROOF_GEOMETRY_CACHE.get(key);
    }

    function createPaletteMaterials(palette, wireframe = false) {
      const result = {};
      for (const [key, color] of Object.entries(palette)) {
        result[key] = new THREE.MeshStandardMaterial({
          color,
          roughness: key === 'glass' ? 0.24 : 0.9,
          metalness: key === 'glass' ? 0.12 : 0.03,
          wireframe
        });
      }
      return result;
    }

    function addBuildingFeatures(group, entry, materials) {
      if (entry.features?.porch) {
        const porch = entry.features.porch;
        const mesh = new THREE.Mesh(
          getBoxGeometry([porch.width, porch.height || 0.4, porch.depth]),
          materials[porch.material || 'accent'] || materials.accent
        );
        mesh.position.set(0, (porch.height || 0.4) * 0.5, porch.depth * 0.5 + 0.4);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }
      if (entry.features?.awning) {
        const awning = entry.features.awning;
        const mesh = new THREE.Mesh(
          getBoxGeometry([awning.width, awning.height || 0.22, awning.depth]),
          materials[awning.material || 'accent'] || materials.accent
        );
        mesh.position.set(0, awning.y || 3.4, awning.depth * 0.5 + 0.2);
        mesh.castShadow = true;
        group.add(mesh);
      }
      if (entry.features?.signBand) {
        const band = entry.features.signBand;
        const mesh = new THREE.Mesh(
          getBoxGeometry([band.width, band.height || 0.55, band.depth || 0.25]),
          materials[band.material || 'accent'] || materials.accent
        );
        mesh.position.set(0, band.y || 3.1, band.z || 5.4);
        group.add(mesh);
      }
      if (entry.features?.garage) {
        const garage = entry.features.garage;
        const mesh = new THREE.Mesh(
          getBoxGeometry([garage.width, garage.height, garage.depth]),
          materials[garage.material || 'accent'] || materials.accent
        );
        mesh.position.set(garage.width / 2 + 6, garage.height / 2, 0);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }
      if (entry.features?.gatehouse) {
        const gatehouse = entry.features.gatehouse;
        const mesh = new THREE.Mesh(
          getBoxGeometry([gatehouse.width, gatehouse.height, gatehouse.depth]),
          materials[gatehouse.material || 'accent'] || materials.accent
        );
        mesh.position.set(0, gatehouse.height / 2, gatehouse.depth / 2 + 8);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }
      if (entry.features?.chimney) {
        const chimney = entry.features.chimney;
        const mesh = new THREE.Mesh(
          getBoxGeometry([chimney.width || 1, chimney.height || 3, chimney.depth || 1]),
          materials[chimney.material || 'roof'] || materials.roof
        );
        mesh.position.set(chimney.x || 3, chimney.height / 2 + (chimney.baseY || 4), chimney.z || -2);
        mesh.castShadow = true;
        group.add(mesh);
      }
      if (entry.features?.dormer) {
        const dormer = entry.features.dormer;
        const mesh = new THREE.Mesh(
          getBoxGeometry([dormer.width || 2, dormer.height || 2, dormer.depth || 2]),
          materials[dormer.material || 'body'] || materials.body
        );
        mesh.position.set(dormer.x || 0, dormer.y || 5, dormer.z || 3);
        mesh.castShadow = true;
        group.add(mesh);
      }
      if (entry.features?.bay) {
        const bay = entry.features.bay;
        const mesh = new THREE.Mesh(
          getBoxGeometry([bay.width || 3, bay.height || 4, bay.depth || 1.5]),
          materials[bay.material || 'body'] || materials.body
        );
        mesh.position.set(bay.x || 0, bay.y || 3, bay.z || 5);
        mesh.castShadow = true;
        group.add(mesh);
      }
    }

    function createRoofMesh(roof, buildingGroup, materials) {
      const bounds = new THREE.Box3().setFromObject(buildingGroup);
      const size = bounds.getSize(new THREE.Vector3());
      const center = bounds.getCenter(new THREE.Vector3());

      if (roof.type === 'gable') {
        const geometry = getGableRoofGeometry(
          size.x + (roof.overhang || 0.6) * 2,
          size.z + (roof.overhang || 0.6) * 2,
          roof.height || 1.8
        );
        const mesh = new THREE.Mesh(geometry, materials[roof.material || 'roof'] || materials.roof);
        mesh.position.set(center.x, bounds.max.y + (roof.height || 1.8) * 0.5 - 0.05, center.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      const flatHeight = roof.height || 0.35;
      const inset = roof.inset || 0.45;
      const mesh = new THREE.Mesh(
        getBoxGeometry([Math.max(1, size.x - inset * 2), flatHeight, Math.max(1, size.z - inset * 2)]),
        materials[roof.material || 'roof'] || materials.roof
      );
      mesh.position.set(center.x, bounds.max.y + flatHeight * 0.5, center.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createBuildingFromEntry(entry, wireframe = false) {
      const group = new THREE.Group();
      const materials = createPaletteMaterials(entry.palette || {}, wireframe);

      for (const piece of entry.pieces || []) {
        const mesh = new THREE.Mesh(getBoxGeometry(piece.size), materials[piece.material || 'body'] || materials.body);
        mesh.position.set(piece.offset[0], piece.offset[1], piece.offset[2]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }

      addBuildingFeatures(group, entry, materials);
      if (entry.roof) {
        group.add(createRoofMesh(entry.roof, group, materials));
      }

      return group;
    }

    function normalizeCatalogEntry(entry) {
      if (!entry?.id || !Array.isArray(entry?.districts) || !Array.isArray(entry?.pieces) || !entry.pieces.length) {
        return null;
      }
      return {
        ...entry,
        weight: entry.weight ?? 1,
        lot: {
          frontage: entry.lot?.frontage || [12, 18],
          depth: entry.lot?.depth || [16, 24],
          setback: entry.lot?.setback || [4, 10]
        },
        palette: {
          body: entry.palette?.body || '#cfc3b4',
          accent: entry.palette?.accent || '#867869',
          roof: entry.palette?.roof || '#5c4f49',
          glass: entry.palette?.glass || '#8fa4b6'
        },
        textures: entry.textures || {},
        roof: entry.roof || null,
        features: entry.features || {}
      };
    }

    function loadCatalogEntries() {
      const entries = [];
      for (const [path, pack] of Object.entries(CATALOG_MODULES)) {
        const packId = pack.packId || path.split('/').pop().replace('.json', '');
        if (pack.entries) {
          for (const entry of pack.entries) {
            const normalized = normalizeCatalogEntry(entry);
            if (normalized) {
              entries.push({ ...normalized, packId, _packPath: path });
            }
          }
        }
      }
      return entries;
    }

    const allBuildings = loadCatalogEntries();
    let currentIndex = 0;
    let currentBuilding = null;
    let generatedEntry = null;

    function setStatus(msg, type = 'normal') {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = type;
    }

    function updateBuildingInfo() {
      const entry = allBuildings[currentIndex];
      document.getElementById('building-name').textContent = entry.id;
      document.getElementById('building-pack').textContent = `Pack: ${entry.packId}`;
      document.getElementById('building-districts').textContent = `Districts: ${entry.districts.join(', ')}`;
      document.getElementById('building-count').textContent = `Building ${currentIndex + 1} / ${allBuildings.length}`;
      document.getElementById('current-json').value = JSON.stringify(entry, null, 2);
    }

    function updateCatalogList() {
      const list = document.getElementById('catalog-list');
      list.innerHTML = '';

      const currentPack = allBuildings[currentIndex]?.packId;
      const packBuildings = allBuildings.filter(b => b.packId === currentPack);

      for (let i = 0; i < packBuildings.length; i++) {
        const globalIndex = allBuildings.indexOf(packBuildings[i]);
        const entry = packBuildings[i];
        const btn = document.createElement('button');
        btn.textContent = entry.id;
        if (globalIndex === currentIndex) btn.classList.add('active');
        btn.onclick = () => {
          currentIndex = globalIndex;
          renderCurrentBuilding();
        };
        list.appendChild(btn);
      }
    }

    function renderCurrentBuilding() {
      if (currentBuilding) {
        scene.remove(currentBuilding);
      }

      const entry = allBuildings[currentIndex];
      currentBuilding = createBuildingFromEntry(entry, wireframeMode);

      const bounds = new THREE.Box3().setFromObject(currentBuilding);
      const size = bounds.getSize(new THREE.Vector3());
      const center = bounds.getCenter(new THREE.Vector3());

      currentBuilding.position.sub(center);
      currentBuilding.position.y = -bounds.min.y;
      scene.add(currentBuilding);

      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim * 2;
      camera.position.set(distance, distance * 0.8, distance);
      camera.lookAt(0, size.y / 3, 0);

      updateBuildingInfo();
      updateCatalogList();
    }

    document.getElementById('prevBtn').onclick = () => {
      currentIndex = (currentIndex - 1 + allBuildings.length) % allBuildings.length;
      renderCurrentBuilding();
    };

    document.getElementById('nextBtn').onclick = () => {
      currentIndex = (currentIndex + 1) % allBuildings.length;
      renderCurrentBuilding();
    };

    document.getElementById('savePngBtn').onclick = () => {
      const entry = allBuildings[currentIndex];
      const link = document.createElement('a');
      link.download = `${entry.id}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      setStatus(`Saved: ${entry.id}.png`);
    };

    document.getElementById('toggleWireBtn').onclick = (e) => {
      wireframeMode = !wireframeMode;
      e.target.classList.toggle('active', wireframeMode);
      renderCurrentBuilding();
    };

    document.getElementById('toggleRotateBtn').onclick = (e) => {
      autoRotate = !autoRotate;
      e.target.classList.toggle('active', autoRotate);
      controls.autoRotate = autoRotate;
    };

    function buildPrompt(entry, level) {
      const levelDesc = {
        moderate: 'Add 2-3x more pieces and details. Keep the building recognizable.',
        high: 'Add 3-5x more pieces with architectural details like trim, window frames, steps.',
        extreme: 'Add 5-10x more pieces with full architectural detail: moldings, shutters, gutters, detailed roof structure.'
      };

      return `You are a procedural building architect. Enhance this building catalog entry with more detail.

CATALOG SCHEMA:
- id: unique identifier (string)
- districts: array of zone types (residential_low, residential_mid, residential_high, mixed_main, commercial, civic, industrial)
- weight: spawn frequency 1-5
- lot: { frontage: [min,max], depth: [min,max], setback: [min,max] }
- palette: { body, accent, roof, glass } - hex colors
- pieces: array of { material, size: [w,h,d], offset: [x,y,z] }
- roof: { type: "gable"|"flat", height, overhang?, inset?, material }
- features: optional objects like porch, awning, signBand, garage, gatehouse, chimney, dormer, bay
- textures: optional texture hints for materials

TASK: ${levelDesc[level]}

RULES:
1. Preserve the original building identity and style
2. Add architectural details as additional pieces
3. You may add new features (chimney, dormer, bay, etc.)
4. Keep colors in the same palette family
5. Return ONLY valid JSON, no markdown

INPUT:
${JSON.stringify(entry, null, 2)}

OUTPUT (enhanced JSON only):`;
    }

    async function callOpenRouter(prompt, model) {
      if (!OPENROUTER_API_KEY) {
        throw new Error('VITE_OPENROUTER_API_KEY not set in .env.local');
      }

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Building Manager'
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          max_tokens: 4096
        })
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error(`OpenRouter error: ${response.status} - ${err}`);
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    function extractJson(text) {
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('No JSON object found in response');
      return JSON.parse(jsonMatch[0]);
    }

    document.getElementById('previewPromptBtn').onclick = () => {
      const entry = allBuildings[currentIndex];
      const level = document.getElementById('lod-level').value;
      const prompt = buildPrompt(entry, level);

      const preview = document.getElementById('prompt-preview');
      if (preview) {
        preview.textContent = prompt;
      } else {
        alert(prompt);
      }
    };

    document.getElementById('generateLodBtn').onclick = async () => {
      const btn = document.getElementById('generateLodBtn');
      const applyBtn = document.getElementById('applyLodBtn');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      setStatus('Calling OpenRouter API...', 'warning');

      try {
        const entry = allBuildings[currentIndex];
        const model = document.getElementById('model-select').value;
        const level = document.getElementById('lod-level').value;

        const prompt = buildPrompt(entry, level);
        const response = await callOpenRouter(prompt, model);

        generatedEntry = extractJson(response);
        generatedEntry.packId = entry.packId;
        generatedEntry._packPath = entry._packPath;

        document.getElementById('generated-json').value = JSON.stringify(generatedEntry, null, 2);
        document.querySelector('[data-tab="generated"]').click();

        applyBtn.disabled = false;
        setStatus(`Generated enhanced LOD (${generatedEntry.pieces?.length || 0} pieces)`, 'success');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Enhanced LOD';
      }
    };

    document.getElementById('applyLodBtn').onclick = () => {
      if (!generatedEntry) return;

      allBuildings[currentIndex] = generatedEntry;
      document.getElementById('current-json').value = JSON.stringify(generatedEntry, null, 2);
      renderCurrentBuilding();
      setStatus('Applied generated LOD to current building', 'success');
    };

    document.getElementById('useGeneratedBtn').onclick = () => {
      try {
        const json = document.getElementById('generated-json').value;
        generatedEntry = JSON.parse(json);
        generatedEntry.packId = allBuildings[currentIndex].packId;
        generatedEntry._packPath = allBuildings[currentIndex]._packPath;

        allBuildings[currentIndex] = generatedEntry;
        document.getElementById('current-json').value = JSON.stringify(generatedEntry, null, 2);
        renderCurrentBuilding();
        document.querySelector('[data-tab="current"]').click();
        setStatus('Applied generated JSON', 'success');
      } catch (err) {
        setStatus(`Parse error: ${err.message}`, 'error');
      }
    };

    document.getElementById('saveCurrentBtn').onclick = () => {
      try {
        const json = document.getElementById('current-json').value;
        const entry = JSON.parse(json);
        allBuildings[currentIndex] = { ...entry, packId: allBuildings[currentIndex].packId, _packPath: allBuildings[currentIndex]._packPath };
        renderCurrentBuilding();
        setStatus('Updated building from JSON', 'success');
      } catch (err) {
        setStatus(`Parse error: ${err.message}`, 'error');
      }
    };

    document.getElementById('resetCurrentBtn').onclick = () => {
      updateBuildingInfo();
      setStatus('Reset to original', 'normal');
    };

    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
      };
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    async function init() {
      await renderer.init();
      renderCurrentBuilding();
      animate();
      setStatus(`Loaded ${allBuildings.length} buildings from ${Object.keys(CATALOG_MODULES).length} catalogs`);
      if (!OPENROUTER_API_KEY) {
        setStatus('Warning: VITE_OPENROUTER_API_KEY not set in .env.local', 'warning');
      }
    }
    init();
  </script>
</body>

</html>
